<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberti 가입 화면기획서</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
    background: #fafafa;
    color: #222;
  }

  /* ── 상단 고정 탭바 ── */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: #1e293b;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .topbar-title { font-size: 14px; font-weight: 700; }
  .topbar-btn {
    padding: 6px 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  .topbar-btn:hover { background: rgba(255,255,255,0.2); }

  /* ── 좌측 목차 사이드바 ── */
  .sidebar {
    position: fixed;
    top: 48px;
    left: 0;
    bottom: 0;
    width: 224px;
    background: #fff;
    border-right: 1px solid #e2e8f0;
    overflow-y: auto;
    z-index: 900;
    padding: 16px 0 32px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

  .sidebar-group-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #94a3b8;
    padding: 12px 16px 4px;
  }
  .sidebar-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 6px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.12s;
    text-decoration: none;
  }
  .sidebar-item:hover {
    background: #f1f5f9;
    border-left-color: #94a3b8;
  }
  .sidebar-item.active {
    background: #eff6ff;
    border-left-color: #3b82f6;
  }
  .sidebar-item .item-id {
    font-size: 9px;
    font-weight: 700;
    color: #94a3b8;
    font-family: monospace;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .sidebar-item.active .item-id { color: #3b82f6; }
  .sidebar-item .item-name {
    font-size: 12px;
    font-weight: 500;
    color: #475569;
    line-height: 1.4;
  }
  .sidebar-item.active .item-name { color: #1d4ed8; font-weight: 600; }

  /* ── 본문 ── */
  main {
    padding-top: 48px;
    margin-left: 224px;
  }

  /* 페이지 섹션 */
  .page-section {
    border-bottom: 2px solid #e0e0e0;
    position: relative;
  }
  .page-frame {
    width: 100%;
    border: none;
    display: block;
    overflow: hidden;
  }

  /* ── 블러 처리 ── */
  .page-section.blurred {
    pointer-events: none;
    user-select: none;
  }
  .page-section.blurred .page-frame {
    filter: blur(6px);
    opacity: 0.5;
  }
  .blur-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 10;
    align-items: center;
    justify-content: center;
    background: rgba(248, 250, 252, 0.3);
  }
  .page-section.blurred .blur-overlay {
    display: flex;
  }
  .blur-label {
    background: rgba(30, 41, 59, 0.7);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    backdrop-filter: blur(4px);
  }

  /* ── 오버레이 ── */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 2000;
    padding: 48px 24px 24px;
  }
  .overlay.active { display: flex; flex-direction: column; }
  .overlay-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: #1e293b;
    border-radius: 8px 8px 0 0;
    color: #fff;
  }
  .overlay-header-title { font-size: 13px; font-weight: 600; }
  .overlay-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .overlay-close:hover { opacity: 0.7; }
  .overlay iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
    border-radius: 0 0 8px 8px;
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Liberti 가입 화면기획서</span>
  <button class="topbar-btn" onclick="toggleOverlay()">가입 프로세스 다이어그램</button>
</div>

<!-- 좌측 목차 -->
<nav class="sidebar" id="sidebar"></nav>

<div class="overlay" id="overlay">
  <div class="overlay-header">
    <span class="overlay-header-title">가입 프로세스 다이어그램</span>
    <button class="overlay-close" onclick="toggleOverlay()">&times;</button>
  </div>
  <iframe src="v2-process.html"></iframe>
</div>

<main id="main"></main>

<script>
const PAGES = [
  // ── 공통 ──
  { group: '공통',      id: 'REG-001-A',   pid: 'REG-001',     name: '유저타입선택 — 초기 상태',      file: 'v2-REG-001-A.html',            blur: false },
  { group: null,        id: 'REG-001-B',   pid: 'REG-001',     name: '유저타입선택 — 개인 선택 시',   file: 'v2-REG-001-B.html',            blur: false },
  { group: null,        id: 'REG-001-C',   pid: 'REG-001',     name: '유저타입선택 — 법인 선택 시',   file: 'v2-REG-001-C.html',            blur: false },
  { group: null,        id: 'REG-002',     pid: 'REG-002',     name: '회원가입',                        file: 'v2-SCR-REG-002.html',          blur: false },
  // ── 개인 가입 ──
  { group: '개인 가입', id: 'REG-IND-001', pid: 'REG-IND-001', name: '가입목적',                        file: 'v2-REG-IND-001.html',          blur: true },
  { group: null,        id: 'REG-IND-002', pid: 'REG-IND-002', name: '적성설문',                        file: 'v2-REG-IND-002.html',          blur: true },
  { group: null,        id: 'REG-IND-003', pid: 'REG-IND-003', name: '매도만 가능 안내',               file: 'v2-REG-IND-003.html',          blur: true },
  { group: null,        id: 'REG-IND-004', pid: 'REG-IND-004', name: '고객정보입력 — 일본',            file: 'v2-REG-IND-004.html',          blur: true },
  { group: null,        id: 'REG-IND-005', pid: 'REG-IND-005', name: '본인확인 — 마이넘버',            file: 'v2-REG-IND-005.html',          blur: true },
  { group: null,        id: 'REG-IND-009', pid: 'REG-IND-009', name: '고객정보입력 — 해외',            file: 'v2-REG-IND-009.html',          blur: true },
  { group: null,        id: 'REG-IND-010', pid: 'REG-IND-010', name: '본인확인 — 여권',                file: 'v2-REG-IND-010.html',          blur: true },
  { group: null,        id: 'REG-IND-012', pid: 'REG-IND-012', name: '조합정보입력',                   file: 'v2-REG-IND-012.html',          blur: true },
  // ── 법인 가입 ──
  { group: '법인 가입', id: 'REG-COM-003', pid: 'REG-COM-003', name: '법인정보입력 — 일본',            file: 'v2-REG-COM-003.html',          blur: true },
  { group: null,        id: 'REG-COM-004', pid: 'REG-COM-004', name: '가입불가 안내',                   file: 'v2-REG-COM-004.html',          blur: true },
  { group: null,        id: 'REG-COM-005', pid: 'REG-COM-005', name: '실질적지배자 입력',              file: 'v2-REG-COM-005.html',          blur: true },
  { group: null,        id: 'REG-COM-005-OV', pid: null,       name: '법인정보입력 — 해외',            file: 'v2-REG-COM-005-overseas.html', blur: true },
  { group: null,        id: 'REG-COM-006', pid: 'REG-COM-006', name: '담당자정보입력 — 일본',          file: 'v2-REG-COM-006.html',          blur: true },
  { group: null,        id: 'REG-COM-007', pid: null,          name: '담당자정보입력 — 해외',          file: 'v2-REG-COM-007.html',          blur: true },
  { group: null,        id: 'REG-COM-008', pid: 'REG-COM-007', name: '담당자 본인확인',                file: 'v2-REG-COM-008.html',          blur: true },
  { group: null,        id: 'REG-COM-012', pid: 'REG-COM-012', name: '매도 불가 안내',                 file: 'v2-REG-COM-012.html',          blur: true },
  // ── eKYC ──
  { group: 'eKYC',      id: 'KYC-001',    pid: null,           name: 'QR코드 스캔',                     file: 'v2-SCR-KYC-001.html',          blur: true },
  { group: null,        id: 'KYC-002',    pid: 'REG-IND-006',  name: '본인확인 완료',                   file: 'v2-SCR-KYC-002.html',          blur: true },
  // ── 서류제출 ──
  { group: '서류제출',  id: 'DOC-001',    pid: 'REG-IND-007',  name: '투자자 자격 확인 서류',           file: 'v2-SCR-DOC-001.html',          blur: true },
  { group: null,        id: 'DOC-002',    pid: null,            name: '주소확인 서류',                   file: 'v2-SCR-DOC-002.html',          blur: true },
  { group: null,        id: 'DOC-003',    pid: 'REG-COM-008',  name: '법인 서류제출 — 일본',            file: 'v2-SCR-DOC-003.html',          blur: true },
  { group: null,        id: 'DOC-004',    pid: null,            name: '법인 서류제출 — 해외',            file: 'v2-SCR-DOC-004.html',          blur: true },
  { group: null,        id: 'DOC-099',    pid: 'REG-COM-009',  name: '서류제출 완료',                   file: 'v2-SCR-DOC-099.html',          blur: true },
  // ── 공통 마무리 ──
  { group: '공통 마무리', id: 'CMN-001',  pid: 'CMN-001',      name: '로그인',                          file: 'v2-CMN-001.html',              blur: false },
  { group: null,        id: 'PIN-001',    pid: null,            name: 'PIN 안내',                        file: 'v2-SCR-PIN-001.html',          blur: true },
  { group: null,        id: 'PIN-002',    pid: null,            name: 'PIN 입력',                        file: 'v2-SCR-PIN-002.html',          blur: true },
];

const mainEl = document.getElementById('main');
const sidebarEl = document.getElementById('sidebar');
const winToFrame = new WeakMap();
const sidebarItems = {};

// ── 사이드바 목차 생성 ──
PAGES.forEach(page => {
  if (page.group !== null) {
    const label = document.createElement('div');
    label.className = 'sidebar-group-label';
    label.textContent = page.group;
    sidebarEl.appendChild(label);
  }
  const item = document.createElement('a');
  item.className = 'sidebar-item';
  item.href = '#' + page.id;
  item.onclick = (e) => {
    e.preventDefault();
    document.getElementById(page.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  const idEl = document.createElement('span');
  idEl.className = 'item-id';
  idEl.textContent = page.id;
  const nameEl = document.createElement('span');
  nameEl.className = 'item-name';
  nameEl.textContent = page.name;
  item.appendChild(idEl);
  item.appendChild(nameEl);
  sidebarEl.appendChild(item);
  sidebarItems[page.id] = item;
});

// ── 본문 페이지 섹션 생성 ──
PAGES.forEach(page => {
  const section = document.createElement('section');
  section.className = 'page-section' + (page.blur ? ' blurred' : '');
  section.id = page.id;

  const frame = document.createElement('iframe');
  frame.className = 'page-frame';
  frame.src = page.file;
  frame.loading = 'lazy';
  frame.setAttribute('scrolling', 'no');
  frame.style.height = '120px';

  frame.addEventListener('load', () => {
    if (frame.contentWindow) winToFrame.set(frame.contentWindow, frame);
  });

  section.appendChild(frame);

  // 블러 오버레이
  const blurOverlay = document.createElement('div');
  blurOverlay.className = 'blur-overlay';
  const blurLabel = document.createElement('span');
  blurLabel.className = 'blur-label';
  blurLabel.textContent = '포트폴리오 보호를 위해 가려진 화면입니다';
  blurOverlay.appendChild(blurLabel);
  section.appendChild(blurOverlay);

  mainEl.appendChild(section);
});

// ── 메시지 수신 ──
window.addEventListener('message', (e) => {
  if (!e.data) return;
  if (e.data.type === 'iframeHeight' && e.data.h > 50) {
    const frame = winToFrame.get(e.source);
    if (frame) frame.style.height = e.data.h + 'px';
  }
  if (e.data.type === 'navigate' && e.data.pageId) {
    document.getElementById('overlay').classList.remove('active');
    const target = document.getElementById(e.data.pageId);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
});

// ── 현재 화면 추적 ──
let currentPageId = null;
const pidMap = {};
PAGES.forEach(p => { if (p.pid) pidMap[p.id] = p.pid; });

// ── 스크롤 감지 → 사이드바 활성 항목 업데이트 ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const item = sidebarItems[entry.target.id];
    if (!item) return;
    if (entry.isIntersecting) {
      currentPageId = entry.target.id;
      item.classList.add('active');
      item.scrollIntoView({ block: 'nearest' });
    } else {
      item.classList.remove('active');
    }
  });
}, { rootMargin: '-48px 0px -60% 0px', threshold: 0 });

document.querySelectorAll('.page-section').forEach(s => observer.observe(s));

function toggleOverlay() {
  const overlay = document.getElementById('overlay');
  const isOpening = !overlay.classList.contains('active');
  overlay.classList.toggle('active');

  if (isOpening && currentPageId) {
    const diagramFrame = overlay.querySelector('iframe');
    const pid = pidMap[currentPageId] || null;
    if (!pid) return;
    const sendHighlight = () => {
      try { diagramFrame.contentWindow.postMessage({ type: 'highlightPage', pid }, '*'); } catch(e) {}
    };
    diagramFrame.addEventListener('load', sendHighlight, { once: true });
    setTimeout(sendHighlight, 100);
  }
}
</script>

</body>
</html>
